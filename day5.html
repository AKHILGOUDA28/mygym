<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 5: Full Body & Strength</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background"></div>
  <div class="container">
    <h1>Day 5: Full Body & Strength</h1>
    <div class="cards">
      <div class="exercise-card" onclick="showDetails('deadlifts')">
        <img src="https://hips.hearstapps.com/hmg-prod/images/deadlift-1651142430.jpg?crop=1.00xw:0.845xh;0,0.0510xh&resize=980:*" alt="Deadlifts">
        <h2>Deadlifts</h2>
        <p>4 sets x 5-8 reps</p>
      </div>
      <div class="exercise-card" onclick="showDetails('front-squats')">
        <img src="https://i.ytimg.com/vi/uYumuL_G_V0/maxresdefault.jpg" alt="Front Squats">
        <h2>Front Squats</h2>
        <p>3 sets x 8 reps</p>
      </div>
      <div class="exercise-card" onclick="showDetails('dumbbell-snatches')">
        <img src="https://i.ytimg.com/vi/3mlhF3dptAo/maxresdefault.jpg" alt="Dumbbell Snatches">
        <h2>Dumbbell Snatches</h2>
        <p>3 sets x 12 reps</p>
      </div>
      <div class="exercise-card" onclick="showDetails('farmers-walk')">
        <img src="https://www.dmoose.com/cdn/shop/articles/1_9631b298-37ec-4b0e-975f-dd6ba6a7c4c9.jpg?v=1653565657" alt="Farmer’s Walk">
        <h2>Farmer’s Walk</h2>
        <p>3 sets x 30 seconds</p>
      </div>
      <div class="exercise-card" onclick="showDetails('treadmill-sprints')">
        <img src="https://i.ytimg.com/vi/x0IbPmWgi3U/sddefault.jpg" alt="Treadmill Sprints">
        <h2>Treadmill Sprints</h2>
        <p>10-15 minutes</p>
      </div>
    </div>
    <div id="details" class="details"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
